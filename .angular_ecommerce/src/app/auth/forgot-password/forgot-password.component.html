<div class="auth-container">
  <div class="auth-box">
    <h2>Reset Password</h2>
    <form (submit)="submit()">
      <div class="input-group">
        <input
          type="email"
          placeholder="Email Address"
          [(ngModel)]="form.email"
          name="email"
          required
        />
      </div>
      <div class="input-group">
        <input
          type="password"
          placeholder="New Password"
          [(ngModel)]="form.passwordHash"
          name="password"
          required
        />
      </div>
      <button type="submit">Update Password</button>
    </form>
  </div>
</div>
