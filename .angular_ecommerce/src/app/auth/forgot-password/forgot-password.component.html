<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-head">
      <div class="auth-icon"><i class="bi bi-key"></i></div>
      <h1>Reset password</h1>
      <p>Enter your email and new password</p>
    </div>
    <form (ngSubmit)="submit()" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" [(ngModel)]="form.email" name="email" placeholder="you@example.com" required />
        </div>
      </div>
      <div class="form-group">
        <label>New password</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" [(ngModel)]="form.passwordHash" name="password" placeholder="New password" required />
        </div>
      </div>
      <button type="submit" class="btn-primary">Update password</button>
    </form>
    <p class="auth-switch">
      <a routerLink="/signin" class="text-link">← Back to sign in</a>
    </p>
  </div>
</div>
