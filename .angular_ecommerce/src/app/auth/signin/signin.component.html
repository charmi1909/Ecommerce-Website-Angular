<div class="auth-page">
  <div class="auth-card">

    <div class="auth-card-head">
      <div class="auth-icon">
        <i class="bi bi-person-circle"></i>
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to your account to continue</p>
    </div>

    <form (ngSubmit)="onSignin()" class="auth-form">

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input 
            type="email"
            [(ngModel)]="credentials.email"
            name="email"
            placeholder="you@example.com"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">

        <div class="label-row">
          <label>Password</label>
          
        </div>

        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            [(ngModel)]="credentials.passwordHash"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>
        <button 
            type="button"
            class="text-link"
            (click)="goToForgotPassword()">
            Forgot password?
          </button>

      </div>

      <!-- Sign In Button -->
      <button type="submit" class="btn-primary">
        Sign in
      </button>

    </form>

    <!-- Sign Up Link -->
    <p class="auth-switch">
      New here?
      <button 
        type="button"
        class="text-link"
        (click)="goToSignUp()">
        Create an account
      </button>
    </p>

  </div>
</div>
