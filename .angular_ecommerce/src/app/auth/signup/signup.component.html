<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-head">
      <div class="auth-icon"><i class="bi bi-person-plus"></i></div>
      <h1>Create account</h1>
      <p>Join us to shop and manage your orders</p>
    </div>
    <form (ngSubmit)="onSignup()" class="auth-form">
      <div class="form-group">
        <label>Full name</label>
        <div class="input-wrap">
          <i class="bi bi-person"></i>
          <input type="text" [(ngModel)]="user.name" name="name" placeholder="John Doe" required />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" [(ngModel)]="user.email" name="email" placeholder="you@example.com" required />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" [(ngModel)]="user.passwordHash" name="password" placeholder="Create a strong password" required />
        </div>
      </div>
      <button type="submit" class="btn-primary">Create account</button>
    </form>
    <p class="auth-switch">
      Already have an account?
      <button type="button" class="text-link" (click)="goToSignIn()">Sign in</button>
    </p>
  </div>
</div>
