<div class="cart-container">
  <h2>🛒 Your Shopping Cart</h2>

  <!-- Error Message -->
  <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

  <!-- Loading Indicator -->
  <p *ngIf="loading" class="loading-message">Loading...</p>

  <div *ngIf="!loading && cartItems.length > 0">
    <div class="cart-items-grid">
      <div class="cart-card" *ngFor="let item of cartItems">
        <div class="cart-card-image">
          <img *ngIf="item.imageUrl" [src]="item.imageUrl" [alt]="item.productName">
        </div>
        <div class="cart-card-body">
          <h4>{{ item.productName }}</h4>
          <p class="price">${{ item.price | number: '1.2-2' }}</p>
          <div class="quantity-control">
            <button (click)="updateQuantity(item, item.quantity - 1)" [disabled]="item.quantity <= 1">➖</button>
            <span>{{ item.quantity }}</span>
            <button (click)="updateQuantity(item, item.quantity + 1)">➕</button>
          </div>
          <p class="line-total">Total: ${{ (item.price * item.quantity) | number: '1.2-2' }}</p>
          <button class="remove-btn" (click)="removeFromCart(item._id)">🗑 Remove</button>
        </div>
      </div>
    </div>

    <div class="cart-summary">
      <input type="text" placeholder="🎟 Enter Promo Code">
      <p class="total-price">Total: <strong>${{ getTotalPrice() | number: '1.2-2' }}</strong></p>
      <button class="checkout-btn" (click)="checkout()">🛍 Proceed to Checkout</button>
    </div>
  </div>

  <p *ngIf="!loading && cartItems.length === 0" class="empty-message">Your cart is empty. Start shopping now! 🛍</p>
</div>
