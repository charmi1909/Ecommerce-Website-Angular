<div class="preloader-wrapper" id="preloader">
  <div class="preloader"></div>
</div>

<header class="site-header">
  <div class="header-inner">

    <a routerLink="/home" class="logo">
      <i class="bi bi-shop" style="color:#ff7a18;"></i>
      <span>Shop</span>
    </a>

    <nav class="nav-main">
      <a routerLink="/home" class="nav-link">
        <i class="bi bi-house-door" style="color:#4CAF50;"></i>
        <span>Home</span>
      </a>

      <div class="dropdown nav-drop">
        <button class="nav-link dropdown-toggle" type="button" data-bs-toggle="dropdown">
          <i class="bi bi-grid-3x3-gap" style="color:#2196F3;"></i>
          <span>Shop</span>
        </button>

        <ul class="dropdown-menu dropdown-menu-nav">
          <li>
            <a class="dropdown-item" routerLink="/products">
              <i class="bi bi-bag" style="color:#FF9800;"></i> All products
            </a>
          </li>
          <li>
            <a class="dropdown-item" (click)="goToCart()">
              <i class="bi bi-cart3" style="color:#E91E63;"></i> Cart
            </a>
          </li>
          <li>
            <a class="dropdown-item" (click)="goToWishlist()">
              <i class="bi bi-heart" style="color:#F44336;"></i> Wishlist
            </a>
          </li>
          <li>
            <a class="dropdown-item" (click)="goToOrderHistory()">
              <i class="bi bi-box-seam" style="color:#9C27B0;"></i> Order history
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="header-actions">

      <ng-container *ngIf="!isLoggedIn">
        <button type="button" class="action-btn" (click)="navigateToSignup()">
          <i class="bi bi-person" style="color:#3F51B5;"></i>
          <span>Sign in</span>
        </button>
      </ng-container>

      <ng-container *ngIf="isLoggedIn">
        <button type="button" class="action-btn" (click)="logout()">
          <i class="bi bi-box-arrow-right" style="color:#ff5252;"></i>
          <span>Sign out</span>
        </button>
      </ng-container>

      <button type="button" class="action-btn" (click)="goToWishlist()">
        <i class="bi bi-heart" style="color:#ff4081;"></i>
        <span>Wishlist</span>
      </button>

      <button type="button" class="action-btn" (click)="goToCart()">
        <i class="bi bi-cart3" style="color:#00BCD4;"></i>
        <span>Cart</span>
      </button>

      <button type="button" class="action-btn" (click)="goToOrderHistory()">
        <i class="bi bi-box-seam" style="color:#673AB7;"></i>
        <span>Orders</span>
      </button>

    </div>

    <button class="navbar-toggler mobile-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav">
      <i class="bi bi-list" style="color:#333;"></i>
    </button>

  </div>
</header>

<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNav">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Menu</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">

    <a routerLink="/home" class="mobile-nav-link" data-bs-dismiss="offcanvas">
      <i class="bi bi-house-door" style="color:#4CAF50;"></i> Home
    </a>

    <a routerLink="/products" class="mobile-nav-link" data-bs-dismiss="offcanvas">
      <i class="bi bi-bag" style="color:#FF9800;"></i> Products
    </a>

    <a (click)="goToCart(); $event.preventDefault()" routerLink="/carts"
       class="mobile-nav-link" data-bs-dismiss="offcanvas">
      <i class="bi bi-cart3" style="color:#E91E63;"></i> Cart
    </a>

    <a (click)="goToWishlist(); $event.preventDefault()" routerLink="/wishlist"
       class="mobile-nav-link" data-bs-dismiss="offcanvas">
      <i class="bi bi-heart" style="color:#F44336;"></i> Wishlist
    </a>

    <a (click)="goToOrderHistory(); $event.preventDefault()" routerLink="/order-history"
       class="mobile-nav-link" data-bs-dismiss="offcanvas">
      <i class="bi bi-box-seam" style="color:#9C27B0;"></i> Orders
    </a>

    <a routerLink="/order" class="mobile-nav-link" data-bs-dismiss="offcanvas">
      <i class="bi bi-credit-card" style="color:#00BCD4;"></i> Checkout
    </a>

    <ng-container *ngIf="!isLoggedIn">
      <a (click)="navigateToSignup(); $event.preventDefault()" routerLink="/signin"
         class="mobile-nav-link" data-bs-dismiss="offcanvas">
        <i class="bi bi-person" style="color:#3F51B5;"></i> Sign in
      </a>
    </ng-container>

    <ng-container *ngIf="isLoggedIn">
      <a (click)="logout(); $event.preventDefault()" routerLink="/signin"
         class="mobile-nav-link" data-bs-dismiss="offcanvas">
        <i class="bi bi-box-arrow-right" style="color:#ff5252;"></i> Sign out
      </a>
    </ng-container>

  </div>
</div>
