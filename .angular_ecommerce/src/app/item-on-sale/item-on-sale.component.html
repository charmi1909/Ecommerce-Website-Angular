<section class="py-5 bg-light">
  <div class="container-lg">
    <div class="row mb-4">
      <div class="col-12 text-center">
        <h2 class="fw-bold">Top Selling Products</h2>
        <p class="text-muted">Customers love these items the most</p>
      </div>
    </div>
    <div class="row g-4" *ngIf="bestSelling.length > 0">
      <div class="col-md-3" *ngFor="let product of bestSelling">
        <div class="card h-100 shadow-sm border-0">
          <img class="card-img-top" [src]="product.images && product.images.length ? product.images[0] : ''" [alt]="product.name">
          <div class="card-body text-center">
            <h6 class="fw-bold mb-1">{{ product.name }}</h6>
            <p class="text-muted small mb-2">{{ product.category.name }}</p>
            <p class="text-muted small mb-2">
              {{ product.description | slice:0:60 }}<span *ngIf="product.description && product.description.length > 60">...</span>
            </p>
            <div class="d-flex justify-content-center align-items-center gap-2 mb-2">
              <span class="fw-bold text-success">${{ product.price | number:'1.2-2' }}</span>
              <span class="badge bg-warning text-dark" *ngIf="product.rating">★ {{ product.rating | number:'1.1-1' }}</span>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-primary btn-sm flex-fill" (click)="viewProduct(product)">View Product</button>
              <button class="btn btn-primary btn-sm flex-fill" (click)="addToCart(product)">Buy</button>
            </div>
            <button class="btn btn-outline-danger btn-sm w-100 mt-2" (click)="addToWishlist(product)">Add to Wishlist</button>
          </div>
        </div>
      </div>
    </div>
    <div class="row" *ngIf="bestSelling.length === 0">
      <div class="col-12 text-center text-muted">
        No top selling products available yet.
      </div>
    </div>
  </div>
</section>
