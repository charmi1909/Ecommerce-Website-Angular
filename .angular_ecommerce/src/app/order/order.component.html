<div class="order-container">
  <h2>🛍 Review Your Order</h2>

  <table class="order-table">
    <thead>
      <tr>
        <th>Product Name</th>
        <th>Quantity</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of orderData.items">
        <td>{{ item.productName }}</td>
        <td>{{ item.quantity }}</td>
        <td>${{ item.price | number: '1.2-2' }}</td>
      </tr>
    </tbody>
  </table>

  <div class="order-summary">
    <h3>Total Price: <span>${{ orderData.totalAmount | number: '1.2-2' }}</span></h3>
  </div>

  <div class="order-form">
    <label for="name">📝 Name:</label>
    <input type="text" id="name" [(ngModel)]="namp" placeholder="Enter your name" />

    <label for="address">🏠 Address:</label>
    <input type="text" id="address" placeholder="Enter your address" />

    <label for="contact">📞 Contact Number:</label>
    <input type="text" id="contact" placeholder="Enter your contact number" />

    <label for="paymentMethod">💳 Payment Method:</label>
    <select id="paymentMethod" [(ngModel)]="paymentMethod">
      <option value="credit_card">Credit Card</option>
      <option value="paypal">PayPal</option>
      <option value="cash_on_delivery">Cash on Delivery</option>
    </select>
  </div>

  <button class="place-order-btn" (click)="placeOrder()">✅ Place Order</button>
</div>
