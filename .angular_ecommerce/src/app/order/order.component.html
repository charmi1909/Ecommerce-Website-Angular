<div class="order-page">
  <div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-credit-card-2-front me-2"></i>Review your order</h2>

    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3">Items</h5>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of orderData.items">
                <td>{{ item.productName }}</td>
                <td>{{ item.quantity }}</td>
                <td>${{ item.price | number: '1.2-2' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="d-flex justify-content-end border-top pt-3">
          <p class="mb-0 fw-bold fs-5 text-success">Total: ${{ orderData.totalAmount | number: '1.2-2' }}</p>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3"><i class="bi bi-geo-alt me-2"></i>Delivery details</h5>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" [(ngModel)]="namp" placeholder="Your name" />
          </div>
          <div class="col-12">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" id="address" placeholder="Delivery address" />
          </div>
          <div class="col-12">
            <label class="form-label">Contact number</label>
            <input type="text" class="form-control" id="contact" placeholder="Phone number" />
          </div>
          <div class="col-12">
            <label class="form-label">Payment method</label>
            <select class="form-select" [(ngModel)]="paymentMethod">
              <option value="credit_card">Credit Card</option>
              <option value="paypal">PayPal</option>
              <option value="cash_on_delivery">Cash on Delivery</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <button class="btn btn-success btn-lg w-100" (click)="placeOrder()">
      <i class="bi bi-check-circle me-2"></i>Place order
    </button>
  </div>
</div>
