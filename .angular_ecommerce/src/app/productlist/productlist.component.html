<div class="container py-4">
    <div class="row">
        <!-- Category Sidebar -->
        <div class="col-md-3">
            <h5 class="mb-3 text-uppercase fw-bold">Categories</h5>
            <ul class="list-group shadow-sm">
                <li *ngFor="let category of categories" 
                    (click)="handleCategory(category._id)"
                    class="list-group-item d-flex align-items-center justify-content-between cursor-pointer">
                    <span>{{ category.name }}</span>
                    <input type="checkbox" class="form-check-input" [checked]="category.isChecked">
                </li>
            </ul>
        </div>

        <!-- Product Grid -->
        <div class="col-md-9">
            <div class="row g-4">
                <div class="col-md-4" *ngFor="let product of products">
                    <div class="card product-card border-0 shadow-sm p-2 position-relative h-100">
                        <a [routerLink]="['/product', product._id]" class="text-decoration-none text-dark">
                          <img [src]="product.images && product.images.length ? product.images[0] : ''" class="card-img-top rounded" alt="{{ product.name }}">
                        </a>

                        

                        <!-- Product Info -->
                        <div class="card-body text-center d-flex flex-column">
                            <a [routerLink]="['/product', product._id]" class="text-decoration-none text-dark">
                              <h6 class="card-title fw-bold text-truncate">{{ product.name }}</h6>
                            </a>
                            <p class="text-muted small">{{ product.category.name }}</p>

                            <!-- Price Section -->
                            <div class="d-flex justify-content-center align-items-center gap-2">
                                <del class="text-muted">${{ product.price | number: '1.2-2' }}</del>
                                <span class="fw-bold text-success">
                                    ${{ product.price - (product.price * 0.10) | number: '1.2-2' }}
                                </span>
                                <span class="badge bg-warning text-dark">🔥 10% OFF</span>
                            </div>

                            <p class="text-muted small mt-2 flex-grow-1">
                              {{ product.description | slice:0:60 }}<span *ngIf="product.description && product.description.length > 60">...</span>
                            </p>

                            <div class="d-flex gap-2 mt-3">
                              <button (click)="addToCart(product._id, product.price)" 
                                      class="btn btn-primary btn-sm w-100 fw-bold">
                                  🛒 Add to Cart
                              </button>
                              <button (click)="addToWishlist(product._id)" 
                                      class="btn btn-outline-danger btn-sm">
                                  ♥
                              </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>    
    </div>
</div>
