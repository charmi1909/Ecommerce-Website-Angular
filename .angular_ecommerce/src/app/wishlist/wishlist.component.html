<div class="wishlist-container">
  <h2>Wishlist</h2>

  <div *ngIf="loading" class="wishlist-loading">Loading...</div>

  <div *ngIf="!loading && items.length === 0" class="wishlist-empty">
    Your wishlist is empty.
  </div>

  <div class="wishlist-grid" *ngIf="!loading && items.length > 0">
    <div class="wishlist-card" *ngFor="let item of items">
      <div class="wishlist-image">
        <img *ngIf="item.imageUrl" [src]="item.imageUrl" [alt]="item.name" />
      </div>
      <div class="wishlist-body">
        <h4>{{ item.name }}</h4>
        <p class="price">${{ item.price | number:'1.2-2' }}</p>
        <div class="wishlist-actions">
          <button class="btn-primary" (click)="addToCart(item)">Add to Cart</button>
          <button class="btn-secondary" (click)="remove(item)">Remove</button>
        </div>
      </div>
    </div>
  </div>
</div>
